<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --font-sans: 'Inter', ui-sans-serif, system-ui, sans-serif;
    --font-display: 'Be Vietnam Pro', ui-sans-serif, system-ui, sans-serif;
    --font-mono: 'Inter', ui-sans-serif, system-ui, sans-serif;
    --bg: #000005;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    cursor: none;
    touch-action: none;
  }

  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  #cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.2s ease, height 0.2s ease, background 0.2s ease;
    mix-blend-mode: difference;
  }
  #cursor.hover {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.6);
  }
  @media (hover: none) {
    #cursor { display: none; }
    html, body { cursor: auto; }
  }

  #header {
    position: fixed;
    top: 36px; left: 40px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
    pointer-events: none;
  }
  #header-logo {
    display: flex; align-items: center; padding: 6px;
    pointer-events: auto; transition: background 0.2s;
  }
  #header-logo:hover { background: rgba(255,255,255,0.05); }
  #header-logo img { width: 28px; height: 28px; display: block; }
  #header-text { pointer-events: none; }
  @media (max-width: 480px) {
    #header { top: 28px; left: 24px; }
  }
  #header h1 {
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: clamp(13px, 1.6vw, 18px);
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  #header p {
    font-family: var(--font-mono);
    font-size: 8px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  #planet-info {
    position: fixed;
    top: 40%;
    left: 0; right: 0;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
    z-index: 100;
  }

  #planet-name {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(32px, 7vw, 58px);
    color: white;
    letter-spacing: -0.02em;
    text-align: center;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  #planet-sub {
    font-family: var(--font-mono);
    font-size: clamp(8px, 1.4vw, 8px);
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 2px;
    text-align: center;
    transition: opacity 0.3s ease;
  }

  .nav-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 100;
    background: none;
    border: none;
    color: rgba(255,255,255,0.2);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 12px 16px;
    transition: color 0.2s ease;
  }
  .nav-arrow:hover { color: rgba(255,255,255,0.7); }
  #nav-left  { left: clamp(16px, 3vw, 36px); }
  #nav-right { right: clamp(16px, 3vw, 36px); }
  @media (hover: none) { .nav-arrow { display: none; } }

  #hint {
    position: fixed;
    bottom: 26px; right: 36px;
    font-family: var(--font-mono);
    font-size: 9px;
    color: rgba(255,255,255,0.18);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    z-index: 100;
    pointer-events: none;
    transition: opacity 1s ease;
  }
  #hint.hidden { opacity: 0; }

  .ripple {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.4);
    pointer-events: none;
    z-index: 300;
    animation: ripple-out 0.8s ease-out forwards;
    transform: translate(-50%, -50%);
  }
  @keyframes ripple-out {
    from { width: 0; height: 0; opacity: 1; }
    to { width: 120px; height: 120px; opacity: 0; }
  }

  /* ─── STARS ─────────────────────────────────────────────────────────────── */
  .star {
    position: fixed;
    width: 1px;
    height: 1px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    z-index: -1;
  }
  .star.twinkle {
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  body { animation: fadeIn 2s ease forwards; }

#map-copyright{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:5;
  font-family:var(--font-mono);font-size: 8px;

#map-copyright a{color:inherit;text-decoration:none;border-bottom:1px solid currentColor;transition:color .2s;}

@media (max-width: 600px) {

    bottom: auto;
    padding-bottom: 0;
    transform: translateY(-50%);
  }

  #map-copyright {
    white-space: nowrap;
    bottom: 14px;
  }
}

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const planetData = [
  {
    id: 'about',
    texture: 'venus.webp',
    radius: 1.7,
    tilt: 0.0,
    tipName: 'About Me',
    sub: 'Background and Contacts',
    url: 'about.html',
    atmosphereColor: 0xffaa00,
    atmosphereOpacity: 0.2,
    rotSpeed: 0.002
  },
  {
    id: 'podcast',
    texture: 'earth.webp',
    radius: 1.8,
    tilt: 0.41,
    tipName: 'Podcast',
    sub: 'cheviaggio.xyz',
    url: 'https://cheviaggio.xyz',
    atmosphereColor: 0x4488ff,
    atmosphereOpacity: 0.13,
    rotSpeed: 0.003
  },
  {
    id: 'portfolio',
    texture: 'mars.webp',
    radius: 1.6,
    tilt: 0.44,
    tipName: 'Portfolio',
    sub: 'Product Design',
    url: 'portfolio.html',
    atmosphereColor: 0xff6633,
    atmosphereOpacity: 0.09,
    rotSpeed: 0.0028
  }
];

const N = planetData.length;

const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
 
const scene = new THREE.Scene();
// On mobile the narrow aspect ratio clips side planets at FOV 45 — use a wider
// field of view so all three planets fit within the viewport simultaneously.
const isMobileView = window.innerWidth <= 600;
const camera = new THREE.PerspectiveCamera(
  isMobileView ? 72 : 45,
  window.innerWidth / window.innerHeight, 0.1, 1000
);
camera.position.set(0, isMobileView ? 2.5 : 3.5, isMobileView ? 14 : 16);
camera.lookAt(0, 0.6, 0);

// ─── LIGHTING ────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const key = new THREE.DirectionalLight(0xfff5e0, 1.1);
key.position.set(8, 6, 10);
scene.add(key);
const fill = new THREE.DirectionalLight(0x8899bb, 0.25);
fill.position.set(-8, -4, -6);
scene.add(fill);

// ─── STARS ───────────────────────────────────────────────────────────────────
(function() {
  const count = 2800;
  const pos   = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const r = 300 + Math.random() * 500;
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.55, sizeAttenuation: true, transparent: true, opacity: 0.72 });
  scene.add(new THREE.Points(geo, mat));
})();

// ─── TWINKLING STARS ───────────────────────────────────────────────────────────
(function() {
  const twinkleCnt = 150;
  for (let i = 0; i < twinkleCnt; i++) {
    const star = document.createElement('div');
    star.className = 'star twinkle';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animation = `twinkle ${2 + Math.random() * 3}s ease-in-out infinite`;
    star.style.animationDelay = Math.random() * 5 + 's';
    document.body.appendChild(star);
  }
})();

// ─── RING ────────────────────────────────────────────────────────────────────
const RING_R    = 5.5;
const RING_TILT = 0.38;
const STEP      = (2 * Math.PI) / N;

function ringPos(angle) {
  const x     = Math.sin(angle) * RING_R;
  const zFlat = Math.cos(angle) * RING_R;
  return new THREE.Vector3(
    x,
    -Math.sin(RING_TILT) * zFlat + 1.8,
     Math.cos(RING_TILT) * zFlat
  );
}

function ringVisual(angle) {
  const z    = Math.cos(RING_TILT) * Math.cos(angle) * RING_R;
  const norm = (z + RING_R) / (2 * RING_R);
  return { scale: 0.45 + norm * 0.55, opacity: 0.25 + norm * 0.75 };
}

// ─── BUILD PLANETS ───────────────────────────────────────────────────────────
const loader  = new THREE.TextureLoader();
const planets = [];

planetData.forEach((p, i) => {
  const tex = loader.load(p.texture);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();

  const mat  = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.88, metalness: 0, transparent: true });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(p.radius, 64, 64), mat);
  mesh.rotation.z = p.tilt;

  const atmMat = new THREE.MeshBasicMaterial({
    color: p.atmosphereColor, transparent: true,
    opacity: p.atmosphereOpacity, side: THREE.FrontSide
  });
  mesh.add(new THREE.Mesh(new THREE.SphereGeometry(p.radius * 1.05, 32, 32), atmMat));

  const group = new THREE.Group();
  group.add(mesh);
  scene.add(group);

  planets.push({ ...p, mesh, group, atmMat, baseAngle: i * STEP });
});

// ─── STATE ───────────────────────────────────────────────────────────────────
let ringAngleTarget  = 0;
let ringAngleCurrent = 0;
let activeIndex      = 0; // Venus/About Me is visually in front at start

// Framerate-independent lerp factor: feel like ~12 frames to settle at 60fps
const LERP_SPEED = 0.1;

function mod(n, m) { return ((n % m) + m) % m; }

function navigate(dir) {
  ringAngleTarget += dir * STEP;
  activeIndex      = mod(activeIndex - dir, N);
  updateUI(activeIndex);
  hideHint();
}

// ─── UI ──────────────────────────────────────────────────────────────────────
const nameEl        = document.getElementById('planet-name');
const subEl         = document.getElementById('planet-sub');
const hint          = document.getElementById('hint');

let hintHidden = false;
function hideHint() {
  if (!hintHidden) { hintHidden = true; hint.classList.add('hidden'); }
}

function updateUI(idx) {
  const p = planetData[idx];
  nameEl.style.opacity   = '0';
  nameEl.style.transform = 'translateY(8px)';
  subEl.style.opacity    = '0';
  setTimeout(() => {
    nameEl.textContent     = p.tipName;
    subEl.textContent      = p.sub;
    nameEl.style.opacity   = '1';
    nameEl.style.transform = 'translateY(0)';
    subEl.style.opacity    = '1';
    if (p.url) {
      actionEl.textContent = '— visit —';
      actionEl.className   = 'has-link';
      actionEl.onclick     = () => window.open(p.url, p.url.startsWith('http') ? '_blank' : '_self');
    } else {
      actionEl.textContent = '— coming soon —';
      actionEl.className   = '';
      actionEl.onclick     = null;
    }
  }, 150);
}

updateUI(activeIndex);

// ─── INPUT ───────────────────────────────────────────────────────────────────
const cursor = document.getElementById('cursor');
let touchStartX = null, touchStartY = null;
let mouseStartX = null, mouseDown = false, mouseDragged = false;
const SWIPE_THRESHOLD = 40;

canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

canvas.addEventListener('touchend', e => {
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > SWIPE_THRESHOLD) navigate(dx < 0 ? -1 : 1);
  touchStartX = null;
}, { passive: true });

canvas.addEventListener('mousedown', e => { mouseDown = true; mouseDragged = false; mouseStartX = e.clientX; });
canvas.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
  if (mouseDown && Math.abs(e.clientX - mouseStartX) > 5) mouseDragged = true;
  // Hover detect
  const m = new THREE.Vector2(
    (e.clientX / window.innerWidth) * 2 - 1,
    (e.clientY / window.innerHeight) * -2 + 1
  );
  const ray = new THREE.Raycaster();
  ray.setFromCamera(m, camera);
  cursor.classList.toggle('hover', ray.intersectObjects(planets.map(p => p.mesh)).length > 0);
});
canvas.addEventListener('mouseup', e => {
  if (mouseDown && mouseDragged) {
    const dx = e.clientX - mouseStartX;
    if (Math.abs(dx) > SWIPE_THRESHOLD) navigate(dx < 0 ? -1 : 1);
  }
  mouseDown = false;
});

canvas.addEventListener('click', e => {
  if (mouseDragged) return;
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = e.clientX + 'px'; r.style.top = e.clientY + 'px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 800);

  const mouse2D = new THREE.Vector2(
    (e.clientX / window.innerWidth) * 2 - 1,
    (e.clientY / window.innerHeight) * -2 + 1
  );
  const ray = new THREE.Raycaster();
  ray.setFromCamera(mouse2D, camera);
  const hits = ray.intersectObjects(planets.map(p => p.mesh));
  if (hits.length > 0) {
    const hitIdx = planets.findIndex(p => p.mesh === hits[0].object);
    if (hitIdx !== activeIndex) {
      let diff = hitIdx - activeIndex;
      if (diff >  N/2) diff -= N;
      if (diff < -N/2) diff += N;
      navigate(-diff);
    } else if (planets[hitIdx].url) {
      const url = planets[hitIdx].url;
      if (url.startsWith('http')) { window.open(url, '_blank'); }
      else { window.location.href = url; }
    }
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === 'ArrowRight') navigate( 1);
});

document.getElementById('nav-left').addEventListener('click',  () => navigate(-1));
document.getElementById('nav-right').addEventListener('click', () => navigate( 1));

// ─── RENDER LOOP ─────────────────────────────────────────────────────────────
let rafId = null;
let pageVisible = true;
let prevTimestamp = null;

document.addEventListener('visibilitychange', () => {
  pageVisible = !document.hidden;
  if (pageVisible) { prevTimestamp = null; scheduleRender(); }
  else { cancelAnimationFrame(rafId); rafId = null; }
});

function scheduleRender() {
  if (rafId === null && pageVisible) rafId = requestAnimationFrame(animate);
}

function animate(timestamp) {
  rafId = null;

  // Framerate-independent lerp
  const dt = prevTimestamp ? Math.min((timestamp - prevTimestamp) / 1000, 0.05) : 0.016;
  prevTimestamp = timestamp;

  // alpha: how much to close the gap this frame — consistent feel at any fps
  const alpha = 1 - Math.pow(1 - LERP_SPEED, dt * 60);
  ringAngleCurrent += (ringAngleTarget - ringAngleCurrent) * alpha;

  planets.forEach(p => {
    const angle = p.baseAngle + ringAngleCurrent;
    const pos   = ringPos(angle);
    const vis   = ringVisual(angle);

    p.group.position.copy(pos);
    p.group.scale.setScalar(vis.scale);
    p.mesh.material.opacity = vis.opacity;

    // Continuous self-rotation
    p.mesh.rotation.y += p.rotSpeed;
  });

  renderer.render(scene, camera);
  scheduleRender(); // run every frame for smooth rotation + lerp
}

scheduleRender();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
