<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Caterina Finelli</title>
<meta name="description" content="Caterina Finelli — Product Designer. Portfolio, podcast, blog e radio."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --font-sans: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --bg: #000005;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    cursor: none;
    touch-action: none;
  }

  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* Custom cursor — hidden on touch devices */
  #cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease, width 0.2s ease, height 0.2s ease, background 0.2s ease;
    mix-blend-mode: difference;
  }
  #cursor.hover {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.6);
  }
  @media (hover: none) {
    #cursor { display: none; }
    html, body { cursor: auto; }
  }

  /* Header */
  #header {
    position: fixed;
    top: 36px; left: 40px;
    z-index: 100;
    pointer-events: none;
  }
  @media (max-width: 480px) {
    #header { top: 28px; left: 24px; }
  }
  #header h1 {
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: clamp(13px, 1.6vw, 18px);
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  #header p {
    font-family: var(--font-mono);
    font-size: 9px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* Planet info — bottom center */
  #planet-info {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 52px;
    pointer-events: none;
    z-index: 100;
    transition: opacity 0.5s ease;
  }

  #planet-name {
    font-family: var(--font-sans);
    font-style: normal;
    font-weight: 700;
    font-size: clamp(32px, 7vw, 58px);
    color: white;
    letter-spacing: -0.02em;
    text-align: center;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  #planet-sub {
    font-family: var(--font-mono);
    font-size: clamp(9px, 1.4vw, 11px);
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 10px;
    text-align: center;
    transition: opacity 0.3s ease;
  }

  #planet-action {
    font-family: var(--font-mono);
    font-size: 9px;
    color: rgba(255,255,255,0.22);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    margin-top: 18px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: auto;
    cursor: pointer;
  }
  #planet-action.has-link { opacity: 1; color: rgba(255,255,255,0.45); }
  #planet-action.has-link:hover { color: rgba(255,255,255,0.85); }

  /* Dot indicators */
  #dots {
    position: fixed;
    bottom: 24px;
    left: 50%; transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 100;
    pointer-events: none;
  }
  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.4s ease, transform 0.4s ease;
  }
  .dot.active {
    background: rgba(255,255,255,0.8);
    transform: scale(1.4);
  }

  /* Swipe hint */
  #hint {
    position: fixed;
    bottom: 26px; right: 36px;
    font-family: var(--font-mono);
    font-size: 9px;
    color: rgba(255,255,255,0.18);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    z-index: 100;
    pointer-events: none;
    transition: opacity 1s ease;
  }
  #hint.hidden { opacity: 0; }

  /* Click ripple */
  .ripple {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.4);
    pointer-events: none;
    z-index: 300;
    animation: ripple-out 0.8s ease-out forwards;
    transform: translate(-50%, -50%);
  }
  @keyframes ripple-out {
    from { width: 0; height: 0; opacity: 1; }
    to { width: 120px; height: 120px; opacity: 0; }
  }

  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  body { animation: fadeIn 2s ease forwards; }
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="canvas"></canvas>

<div id="header">
  <h1>Caterina Finelli</h1>
  <p>Product Designer</p>
</div>

<div id="planet-info">
  <div id="planet-name">Terra</div>
  <div id="planet-sub">cheviaggio.xyz</div>
  <div id="planet-action">— visita —</div>
</div>

<div id="dots"></div>
<div id="hint">← swipe →</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── PLANET DATA ─────────────────────────────────────────────────────────────
const planetData = [
  {
    id: 'venus',
    texture: 'venus.jpg',
    radius: 1.3,
    tilt: 0.05,
    tipName: 'Venere',
    sub: 'Blog — coming soon',
    url: null,
    atmosphereColor: 0xff8833,
    atmosphereOpacity: 0.18
  },
  {
    id: 'earth',
    texture: 'earth.jpg',
    radius: 1.4,
    tilt: 0.41,
    tipName: 'Terra',
    sub: 'cheviaggio.xyz',
    url: 'https://cheviaggio.xyz',
    atmosphereColor: 0x4488ff,
    atmosphereOpacity: 0.12
  },
  {
    id: 'mars',
    texture: 'mars.jpg',
    radius: 1.1,
    tilt: 0.44,
    tipName: 'Marte',
    sub: 'Portfolio',
    url: 'https://finelli.xyz/portfolio',
    atmosphereColor: 0xff6633,
    atmosphereOpacity: 0.08
  },
  {
    id: 'jupiter',
    texture: 'jupiter.jpg',
    radius: 2.2,
    tilt: 0.05,
    tipName: 'Giove',
    sub: 'Radio — coming soon',
    url: null,
    atmosphereColor: 0xccaa77,
    atmosphereOpacity: 0.06
  }
];

// ─── SCENE ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 3.5, 14);
camera.lookAt(0, -0.6, 0);

// ─── LIGHTING ────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);
const key = new THREE.DirectionalLight(0xfff5e0, 1.1);
key.position.set(8, 6, 10);
scene.add(key);
const fill = new THREE.DirectionalLight(0x8899bb, 0.35);
fill.position.set(-10, -5, -8);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xaabbff, 0.2);
rim.position.set(0, 10, -15);
scene.add(rim);

// ─── STARS ───────────────────────────────────────────────────────────────────
(function createStars() {
  const geo = new THREE.BufferGeometry();
  const count = 3000;
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    pos[i*3]   = (Math.random()-0.5)*1200;
    pos[i*3+1] = (Math.random()-0.5)*1200;
    pos[i*3+2] = (Math.random()-0.5)*1200;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0xffffff, size: 0.22, transparent: true, opacity: 0.65, sizeAttenuation: true
  })));
})();

// ─── CIRCULAR ORBIT LAYOUT ───────────────────────────────────────────────────
// Planets sit on an elliptical ring. The active planet is always at the front
// (angle = 0). Swiping rotates the whole ring so the next/prev planet comes
// to the front.

const N = planetData.length;

// Orbit radii — ellipse so the ring reads as 3-D
const ORBIT_RX = 6.5;   // horizontal semi-axis
const ORBIT_RZ = 3.8;   // depth semi-axis (flattens the ellipse)
const ORBIT_Y  = -0.6;  // slight downward tilt of the ring centre

// Each planet sits at angle: baseAngle[i] = 2π * i / N
// When activeIndex changes we rotate the whole ring so that planet lands at 0.
// ringOffset is the current rotation of the ring (in radians).

function planetAngle(planetIndex, ringOffset) {
  // Evenly spaced, ring rotated so active planet → 0 (front)
  return (2 * Math.PI * planetIndex / N) + ringOffset;
}

function getOrbitTransform(angle) {
  // Position on the ellipse
  const x = Math.sin(angle) * ORBIT_RX;
  const z = -Math.cos(angle) * ORBIT_RZ;   // negative so 0 = toward camera

  // Scale & opacity: front (z > 0) = big/bright, back = small/dim
  // cos(angle) ranges from -1 (back) to +1 (front)
  const cosA = Math.cos(angle);   // +1 front, -1 back
  const t    = (cosA + 1) / 2;    // 0..1

  const scale   = 0.38 + t * 0.62;           // 0.38 (back) → 1.0 (front)
  const opacity = 0.15 + t * 0.85;           // 0.15 → 1.0

  // Slight Y tilt of each planet to face the camera as it orbits
  const rotY = -angle;

  return { x, y: ORBIT_Y, z, scale, opacity, rotY };
}

// ─── BUILD PLANET OBJECTS ─────────────────────────────────────────────────────
const loader = new THREE.TextureLoader();
const planets = [];

planetData.forEach((p, i) => {
  const tex = loader.load(p.texture);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();

  const geo = new THREE.SphereGeometry(p.radius, 64, 64);
  const mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.88, metalness: 0.0 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.z = p.tilt;

  // Atmosphere
  const atmGeo = new THREE.SphereGeometry(p.radius * 1.045, 32, 32);
  const atmMat = new THREE.MeshBasicMaterial({
    color: p.atmosphereColor,
    transparent: true,
    opacity: p.atmosphereOpacity,
    side: THREE.FrontSide
  });
  mesh.add(new THREE.Mesh(atmGeo, atmMat));

  const group = new THREE.Group();
  group.add(mesh);
  scene.add(group);

  planets.push({ ...p, mesh, group, atmMat, rotSpeed: 0.002 + Math.random() * 0.003 });
});

// ─── STATE ───────────────────────────────────────────────────────────────────
let activeIndex = 1; // start on Earth

// Ring offset: rotated so that activeIndex sits at angle 0 (front).
function targetRingOffset(idx) {
  return -2 * Math.PI * idx / N;
}

let ringOffset     = targetRingOffset(activeIndex);
let ringOffsetFrom = ringOffset;
let ringOffsetTo   = ringOffset;

let animProgress = 0;
let isAnimating  = false;
// keep toIndex alias for swipe handler compatibility
let toIndex = activeIndex;

function startTransition(newIndex) {
  if (isAnimating) return;
  // Wrap index for infinite looping
  newIndex = ((newIndex % N) + N) % N;
  if (newIndex === activeIndex) return;

  // Choose shorter arc
  let diff = newIndex - activeIndex;
  if (diff >  N / 2) diff -= N;
  if (diff < -N / 2) diff += N;

  const step = 2 * Math.PI / N;
  ringOffsetFrom = ringOffset;
  ringOffsetTo   = ringOffset - diff * step;

  activeIndex  = newIndex;
  toIndex      = newIndex;
  isAnimating  = true;
  animProgress = 0;
  updateUI(newIndex);
}

// ─── UI ──────────────────────────────────────────────────────────────────────
const nameEl = document.getElementById('planet-name');
const subEl = document.getElementById('planet-sub');
const actionEl = document.getElementById('planet-action');
const dotsContainer = document.getElementById('dots');
const hint = document.getElementById('hint');

// Build dots
planetData.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === activeIndex ? ' active' : '');
  dotsContainer.appendChild(d);
});

let hintHidden = false;
function hideHint() {
  if (!hintHidden) { hintHidden = true; hint.classList.add('hidden'); }
}

function updateUI(idx) {
  const p = planetData[idx];
  nameEl.style.opacity = '0';
  nameEl.style.transform = 'translateY(8px)';
  subEl.style.opacity = '0';
  setTimeout(() => {
    nameEl.textContent = p.tipName;
    subEl.textContent = p.sub;
    nameEl.style.opacity = '1';
    nameEl.style.transform = 'translateY(0)';
    subEl.style.opacity = '1';

    if (p.url) {
      actionEl.textContent = '— visita —';
      actionEl.className = 'has-link';
      actionEl.onclick = () => window.open(p.url, '_blank');
    } else {
      actionEl.textContent = '— coming soon —';
      actionEl.className = '';
      actionEl.onclick = null;
    }
  }, 150);

  // Update dots
  Array.from(dotsContainer.children).forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });
}

// Initial UI
updateUI(activeIndex);

// Set name transition style
nameEl.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
subEl.style.transition = 'opacity 0.3s ease';

// ─── SWIPE / DRAG ────────────────────────────────────────────────────────────
let touchStartX = null;
let touchStartY = null;
let mouseStartX = null;
let mouseDown = false;
let mouseDragged = false;
const SWIPE_THRESHOLD = 40;

canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

canvas.addEventListener('touchend', e => {
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > SWIPE_THRESHOLD) {
    hideHint();
    if (dx < 0) startTransition(toIndex + 1); // swipe left = next
    else         startTransition(toIndex - 1); // swipe right = prev
  }
  touchStartX = null;
}, { passive: true });

canvas.addEventListener('mousedown', e => {
  mouseDown = true;
  mouseDragged = false;
  mouseStartX = e.clientX;
});
canvas.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
  if (mouseDown && Math.abs(e.clientX - mouseStartX) > 5) mouseDragged = true;
});
canvas.addEventListener('mouseup', e => {
  if (mouseDown && mouseDragged) {
    const dx = e.clientX - mouseStartX;
    if (Math.abs(dx) > SWIPE_THRESHOLD) {
      hideHint();
      if (dx < 0) startTransition(toIndex + 1);
      else         startTransition(toIndex - 1);
    }
  }
  mouseDown = false;
});

// Click on canvas → navigate if clicked on a side planet
canvas.addEventListener('click', e => {
  if (mouseDragged) return;
  // Ripple
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = e.clientX + 'px';
  r.style.top = e.clientY + 'px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 800);

  // Check if clicked on a side planet via raycaster
  const mouse2D = new THREE.Vector2(
    (e.clientX / window.innerWidth) * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1
  );
  const ray = new THREE.Raycaster();
  ray.setFromCamera(mouse2D, camera);
  const hits = ray.intersectObjects(planets.map(p => p.mesh));
  if (hits.length > 0) {
    const hitPlanet = planets.find(p => p.mesh === hits[0].object);
    const hitIdx = planets.indexOf(hitPlanet);
    if (hitIdx !== activeIndex) {
      hideHint();
      startTransition(hitIdx);
    } else if (hitPlanet.url) {
      window.open(hitPlanet.url, '_blank');
    }
  }
});

// Keyboard arrow keys
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  { hideHint(); startTransition(toIndex - 1); }
  if (e.key === 'ArrowRight') { hideHint(); startTransition(toIndex + 1); }
});

// ─── CURSOR ──────────────────────────────────────────────────────────────────
const cursor = document.getElementById('cursor');

// ─── EASING ──────────────────────────────────────────────────────────────────
function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
}

// ─── ANIMATE ─────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
const ANIM_DURATION = 0.65; // seconds for ring to rotate

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  // Advance ring transition
  if (isAnimating) {
    animProgress += delta / ANIM_DURATION;
    if (animProgress >= 1) {
      animProgress = 1;
      isAnimating  = false;
      ringOffset   = ringOffsetTo;
    } else {
      const t   = easeInOutCubic(animProgress);
      ringOffset = ringOffsetFrom + (ringOffsetTo - ringOffsetFrom) * t;
    }
  }

  // Update each planet's position on the orbit ring
  planets.forEach((p, i) => {
    const angle = planetAngle(i, ringOffset);
    const tr    = getOrbitTransform(angle);

    p.group.position.set(tr.x, tr.y, tr.z);
    p.group.scale.setScalar(tr.scale);

    // Tilt group to face camera
    p.group.rotation.y = tr.rotY;

    // Material opacity
    p.mesh.material.opacity = tr.opacity;
    p.mesh.material.transparent = true;

    // Self-rotation on own axis (y axis of the mesh inside the group)
    p.mesh.rotation.y += p.rotSpeed * delta * 60 * 0.016;
  });

  renderer.render(scene, camera);
}

animate();

// ─── RESIZE ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
