<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  /* Same palette + fonts as the project case-study pages */
  --bg:#0e0f12; --surface:#16181d; --border:#2a2d38;
  --text:#e8eaf0; --muted:#7a7f94;
  --accent:#e8344a; --accent-blue:#4a7cff;
  --font-sans:'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-display:'Be Vietnam Pro', ui-sans-serif, system-ui, sans-serif;
}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);color:var(--text);
  font-family:var(--font-sans);
  touch-action:none;
  -webkit-user-select:none;user-select:none;
}
#c3d{position:fixed;inset:0;z-index:1;display:block;opacity:0;transition:opacity .8s ease;}
#c3d.loaded{opacity:1;}
#cdot{position:fixed;inset:0;z-index:2;display:block;pointer-events:none;opacity:0;transition:opacity .8s ease;}
#cdot.loaded{opacity:1;}
#loading{
  position:fixed;inset:0;z-index:100;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;
  transition:opacity .6s ease;
}
#loading.hidden{opacity:0;pointer-events:none;}
#loading svg{animation:lspin 1s linear infinite;}
@keyframes lspin{to{transform:rotate(360deg);}}
#hit{
  position:fixed;inset:0;z-index:3;
  background:transparent;cursor:grab;touch-action:none;
}
#hit.dragging{cursor:grabbing;}
@media(max-width:599px){#hit.player-open{bottom:70vh;bottom:70dvh;}}
@media(min-width:600px){#hit.player-open{right:360px;}}
#bar{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;padding:.85rem clamp(1.2rem,4vw,3rem);
  background:linear-gradient(rgba(14,15,18,.9),transparent);
  pointer-events:none;
}
#bar a{font-size:.82rem;font-weight:700;color:var(--text);text-decoration:none;pointer-events:auto;}
#bar a strong{font-weight:900}
#back-btn{
  margin-left:auto;font-size:.7rem!important;font-weight:500!important;
  color:var(--muted)!important;border:1px solid rgba(255,255,255,.15);border-radius:20px;
  padding:.3rem .85rem;transition:color .15s,border-color .15s;
}
#back-btn:hover{color:var(--accent)!important;border-color:rgba(232,52,74,.35)!important;}
#hint{
  position:fixed;bottom:8rem;left:50%;transform:translateX(-50%);
  z-index:10;pointer-events:none;
  font-size:.68rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);opacity:1;transition:opacity 1s;white-space:nowrap;
}
#hint.off{opacity:0}
#tip{
  position:fixed;z-index:20;pointer-events:none;
  background:rgba(22,24,29,.95);border:1px solid rgba(255,255,255,.1);
  border-radius:8px;padding:.45rem .8rem;font-size:.78rem;
  backdrop-filter:blur(12px);opacity:0;transition:opacity .15s;white-space:nowrap;
}
#tip.on{opacity:1}
#tip b{display:block;font-weight:700}
#tip span{font-size:.62rem;color:var(--accent);font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
#player{
  position:fixed;z-index:15;
  bottom:0;left:0;right:0;
  background:rgba(22,24,29,.98);
  border-top:1px solid rgba(255,255,255,.1);
  border-radius:20px 20px 0 0;
  padding:1rem 1.1rem .8rem;
  transform:translateY(110%);
  transition:transform .35s cubic-bezier(.25,.46,.45,.94);
  box-shadow:0 -16px 48px rgba(0,0,0,.7);
  pointer-events:auto;
  max-height:70vh;max-height:70dvh;
  display:flex;flex-direction:column;
}
#player.on{transform:translateY(0);}
#player::before{
  content:'';display:block;
  width:36px;height:4px;border-radius:2px;
  background:rgba(255,255,255,.15);
  margin:0 auto .9rem;flex-shrink:0;
}
.ph{display:flex;align-items:flex-start;gap:.7rem;margin-bottom:.75rem;flex-shrink:0;}
#pflag{flex-shrink:0;display:flex;align-items:center;font-size:1.3rem;}
.pi{flex:1;min-width:0;}
#pcity{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--pcol,var(--accent));margin-bottom:.15rem;}
#ptitle{font-family:var(--font-display);font-size:.88rem;font-weight:700;line-height:1.4;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
#pclose{
  width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,.08);color:var(--muted);font-size:.85rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .15s,color .15s;
}
#pclose:hover,#pclose:active{background:rgba(var(--pcol-rgb,232,52,74),.15);color:var(--pcol,var(--accent));}
#plist{
  overflow-y:auto;flex:1;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;
  overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
}
#plist::-webkit-scrollbar{width:3px}
#plist::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.ei{
  display:flex;align-items:center;gap:.6rem;
  padding:.55rem .05rem;border-bottom:1px solid rgba(255,255,255,.05);
  cursor:pointer;border-radius:6px;transition:background .1s;
}
.ei:last-child{border-bottom:none}
.ei:hover,.ei:active{background:rgba(255,255,255,.04)}
.ei.now{background:rgba(var(--pcol-rgb,232,52,74),.07);}
.eib{flex:1;min-width:0;}
.eid{font-size:.58rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);}
.eit{font-size:.92rem;font-weight:500;line-height:1.35;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.eil{
  font-size:.6rem;font-weight:600;color:var(--muted);text-decoration:none;
  letter-spacing:.05em;text-transform:uppercase;flex-shrink:0;
  padding:.25rem .5rem;border-radius:4px;transition:color .15s,background .15s;
}
.eil:hover,.eil:active{color:var(--text);background:rgba(255,255,255,.06);}
/* ── PANEL STYLES ── */
.panel-content{flex:1;overflow-y:auto;padding-top:.25rem;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;}
.panel-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.2rem;}
.panel-tags span{
  font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  padding:6px 14px;border-radius:12px;
  background:rgba(232,52,74,.08);border:1px solid rgba(232,52,74,.25);color:var(--text);
}
/* ── PROJECT HERO + PASSWORD-PAGE CTA ── */
.project-hero{display:flex;flex-direction:column;gap:.7rem;margin-bottom:1.15rem;}
.project-cover{
  position:relative;cursor:pointer;overflow:hidden;
  width:100%;aspect-ratio:16/10;border-radius:14px;
  background:var(--surface);box-shadow:0 12px 32px rgba(0,0,0,.35), inset 0 0 0 1px rgba(255,255,255,.06);
  transition:box-shadow .35s ease;
}
.project-cover img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s cubic-bezier(.25,.46,.45,.94);}
.project-cover:hover{box-shadow:0 12px 32px rgba(0,0,0,.35), 0 0 0 1px var(--accent-blue);}
.project-cover:hover img{transform:scale(1.06);}
.project-cover::before{
  content:'View';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(232,52,74,.95);color:#fff;padding:8px 14px;border-radius:12px;
  font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  z-index:2;opacity:0;transition:opacity .35s ease;pointer-events:none;
}
.project-cover:hover::before{opacity:1;}
.project-cover::after{
  content:'';position:absolute;inset:0;background:rgba(0,0,0,0);
  transition:background .35s ease;z-index:1;pointer-events:none;
}
.project-cover:hover::after{background:rgba(0,0,0,.3);}
/* ── LIGHTBOX (same behavior as the case-study pages: arrow keys / swipe) ── */
.lightbox-overlay{
  position:fixed;inset:0;z-index:300;background:rgba(8,8,12,.94);
  display:none;align-items:center;justify-content:center;padding:60px;cursor:zoom-out;
  touch-action:pan-y;
}
.lightbox-overlay.active{display:flex;}
.lightbox-overlay img{max-width:90vw;max-height:85vh;border-radius:12px;box-shadow:0 30px 80px rgba(0,0,0,.6);cursor:default;}
.lightbox-close{
  position:absolute;top:24px;right:32px;width:40px;height:40px;border-radius:50%;
  border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:#fff;
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.lightbox-close:hover{background:rgba(255,255,255,.15);}
.project-tag{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;}
.project-title{font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:var(--text);line-height:1.2;}
.project-subtitle{font-size:.8rem;font-style:italic;color:var(--muted);margin-top:-.35rem;}
.project-desc{font-size:.86rem;line-height:1.65;color:#c8cfdf;}
.project-action{display:flex;flex-direction:column;gap:.6rem;padding-top:1rem;margin-top:.2rem;border-top:1px solid var(--border);}
.gate-label{font-size:.68rem;font-weight:600;letter-spacing:.03em;color:var(--muted);}
.project-cta{
  display:inline-flex;align-items:center;justify-content:center;gap:.4rem;
  background:var(--accent);color:#fff;border:2px solid rgba(255,255,255,.15);border-radius:8px;
  padding:.7rem 1.1rem;font-size:.86rem;font-weight:700;text-decoration:none;
  transition:filter .15s,transform .1s;touch-action:manipulation;
}
.project-cta:hover{filter:brightness(1.1);}
.project-cta:active{transform:scale(.97);}
/* ── OPEN INFO PANEL (all projects except inFi / X32) ── */
.project-meta{display:flex;flex-direction:column;gap:.15rem;padding-top:1rem;margin-top:.2rem;border-top:1px solid var(--border);}
.project-meta-row{display:flex;justify-content:space-between;gap:1rem;padding:.4rem 0;font-size:.8rem;}
.project-meta-row+.project-meta-row{border-top:1px solid rgba(255,255,255,.05);}
.project-meta-label{color:var(--muted);font-weight:500;}
.project-meta-value{color:var(--text);font-weight:600;text-align:right;}
.project-meta+.project-action{border-top:none;padding-top:.6rem;margin-top:0;}
@media(min-width:600px){
  #player{
    top:0;right:0;bottom:0;left:auto;width:360px;
    border-radius:20px 0 0 20px;
    border-top:none;border-left:1px solid rgba(255,255,255,.1);border-right:none;
    transform:translateX(100%);max-height:100vh;margin-left:0;
    padding:1.5rem 1.2rem 1.2rem;
  }
  #player::before{display:none;}
  #player.on{transform:translateX(0);}
}
#map-copyright{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:5;
  font-family:var(--font-sans);font-size:.65rem;font-weight:500;
  color:rgba(232,234,240,.6);background:rgba(14,15,18,.75);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  padding:.3rem .8rem;border-radius:999px;white-space:nowrap;
  pointer-events:auto;user-select:none;border:1px solid rgba(255,255,255,.08);
}
</style>

// ── PROJECT PANELS — built from PROJECTS: hero (cover + tag + title +
// subtitle + description) shared by all, then either a password gate
// (inFi / X32) or the full meta info directly (everyone else).
// TODO: swap 'password' for a real per-project password (or a shared one) before going live.
// TODO: point passwordUrl at each project's actual password-entry page —
// currently defaulting to the project URL itself (e.g. a Webflow page with
// native password protection prompts right there when you land on it).

function buildHeroHTML(p){
  return (
    '<div class="project-hero">'+
      (p.cover?`<div class="project-cover zoomable" onclick="openLightbox('${p.cover}','${p.n} cover')"><img src="${p.cover}" alt="${p.n} cover" loading="lazy"></div>`:'')+
      '<div class="project-tag" style="color:'+PANEL_ACCENT+'">'+p.tag+'</div>'+
      '<h2 class="project-title">'+p.n+'</h2>'+
      (p.subtitle?'<p class="project-subtitle">'+p.subtitle+'</p>':'')+
      '<p class="project-desc">'+p.desc+'</p>'+
      (p.tags?'<div class="panel-tags">'+p.tags.map(t=>'<span>'+t+'</span>').join('')+'</div>':'')+
    '</div>'
  );
}

// ── LIGHTBOX — same behavior as the case-study pages: click a hero image to
// open it fullscreen, then move with arrow keys or a swipe; Escape or
// tapping the background closes it. Two sources feed it:
// - clicking a hero cover image browses every project's hero image (page-wide .zoomable scan)
// - the "View →" CTA on each project (except inFi/X32) instead opens just that project's own gallery
let currentGalleryImages=null; // null = fall back to the page-wide .zoomable scan

function getGalleryImages(){
  if(currentGalleryImages)return currentGalleryImages;
  return Array.from(document.querySelectorAll('.zoomable img')).map(img=>({
    src: img.getAttribute('src'),
    alt: img.getAttribute('alt')
  }));
}
let currentLightboxIndex=-1;

function openLightbox(src,alt,images){
  currentGalleryImages=images||null;
  const overlay=document.getElementById('lightbox');
  const img=document.getElementById('lightbox-img');
  img.src=src;img.alt=alt||'';
  overlay.classList.add('active');
  document.body.style.overflow='hidden';
  currentLightboxIndex=getGalleryImages().findIndex(item=>item.src===src);
}

// Opens the dedicated gallery for one project (used by its "View →" CTA).
function openProjectGallery(panelKey){
  const p=PROJECTS.find(x=>x.panel===panelKey);
  if(!p||!p.gallery||!p.gallery.length)return;
  const images=p.gallery.map(src=>({src,alt:p.n}));
  openLightbox(images[0].src,images[0].alt,images);
}

function closeLightbox(){
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow='';
  currentLightboxIndex=-1;
  currentGalleryImages=null;
}

function showLightboxAt(index){
  const images=getGalleryImages();
  if(!images.length)return;
  const total=images.length;
  currentLightboxIndex=(index+total)%total;
  const item=images[currentLightboxIndex];
  document.getElementById('lightbox-img').src=item.src;
  document.getElementById('lightbox-img').alt=item.alt||'';
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeLightbox();
  if(currentLightboxIndex===-1)return;
  if(e.key==='ArrowRight'){e.preventDefault();showLightboxAt(currentLightboxIndex+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();showLightboxAt(currentLightboxIndex-1);}
});

let lbTouchStartX=0,lbTouchStartY=0,lbJustSwiped=false;

document.addEventListener('touchstart',e=>{
  const overlay=document.getElementById('lightbox');
  if(!overlay||!overlay.classList.contains('active'))return;
  if(e.touches.length!==1)return;
  lbTouchStartX=e.touches[0].clientX;
  lbTouchStartY=e.touches[0].clientY;
},{passive:true});

document.addEventListener('touchend',e=>{
  const overlay=document.getElementById('lightbox');
  if(!overlay||!overlay.classList.contains('active'))return;
  if(currentLightboxIndex===-1)return;
  const touch=e.changedTouches[0];
  const dx=touch.clientX-lbTouchStartX,dy=touch.clientY-lbTouchStartY;
  if(Math.abs(dx)>40&&Math.abs(dx)>Math.abs(dy)*1.5){
    lbJustSwiped=true;
    if(dx<0)showLightboxAt(currentLightboxIndex+1);
    else showLightboxAt(currentLightboxIndex-1);
  }
},{passive:true});

function handleLightboxOverlayTap(){
  if(lbJustSwiped){lbJustSwiped=false;return;}
  closeLightbox();
}

(function buildProjectPanels(){
  const playerRoot=document.getElementById('player');
  PROJECTS.forEach(p=>{
    const panel=document.createElement('div');
    panel.className='panel-content';
    panel.id='panel-'+p.panel;
    panel.style.display='none';

    if(p.gated){
      const passwordUrl=p.passwordUrl||p.url;
      panel.innerHTML=buildHeroHTML(p)+
        '<div class="project-action">'+
          '<p class="gate-label">This case study is password-protected.</p>'+
          '<a class="project-cta" href="'+passwordUrl+'">Enter password →</a>'+
        '</div>';
    }else{
      const metaRows=(p.meta||[]).map(([label,value])=>
        '<div class="project-meta-row"><span class="project-meta-label">'+label+'</span><span class="project-meta-value">'+value+'</span></div>'
      ).join('');
      const galleryCta=(p.gallery&&p.gallery.length)
        ?`<div class="project-action"><a class="project-cta" href="javascript:void(0)" onclick="openProjectGallery('${p.panel}')">View →</a></div>`
        :'';
      panel.innerHTML=buildHeroHTML(p)+
        (metaRows?'<div class="project-meta">'+metaRows+'</div>':'')+
        galleryCta;
    }

    playerRoot.appendChild(panel);
  });
})();

// ── THREE.JS ──────────────────────────────────────────────────────
const c3d=document.getElementById('c3d');
const renderer=new THREE.WebGLRenderer({canvas:c3d,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
const scene=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.01,100);
cam.position.z = innerWidth <= 768 ? 7.0 : 4.8;
const globe=new THREE.Group();
scene.add(globe);

scene.add(new THREE.AmbientLight(0xffffff,0.92));
const sun=new THREE.DirectionalLight(0xfff8f0,1.75);sun.position.set(5,3,5);scene.add(sun);
const fill=new THREE.DirectionalLight(0x803020,.55);fill.position.set(-4,-2,-3);scene.add(fill);

const NSTARS=6000;
const sp=new Float32Array(NSTARS*3);
for(let i=0;i<NSTARS;i++){const r=12+Math.random()*10,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);sp[i*3]=r*Math.sin(ph)*Math.cos(th);sp[i*3+1]=r*Math.sin(ph)*Math.sin(th);sp[i*3+2]=r*Math.cos(ph);}
const sg=new THREE.BufferGeometry();sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
// Varied star colors: white, light blue, warm yellow
const sc=new Float32Array(NSTARS*3);
for(let i=0;i<NSTARS;i++){const t=Math.random();if(t<.6){sc[i*3]=1;sc[i*3+1]=1;sc[i*3+2]=1;}else if(t<.8){sc[i*3]=.8;sc[i*3+1]=.9;sc[i*3+2]=1;}else{sc[i*3]=1;sc[i*3+1]=.95;sc[i*3+2]=.7;}}
sg.setAttribute('color',new THREE.BufferAttribute(sc,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({vertexColors:true,size:.048,transparent:true,opacity:1,sizeAttenuation:true})));

function loadTexture(){
  new THREE.TextureLoader().load('_mars.webp',
    tex=>{
      tex.anisotropy=renderer.capabilities.getMaxAnisotropy();
      globe.add(new THREE.Mesh(new THREE.SphereGeometry(1,64,64),new THREE.MeshPhongMaterial({map:tex,specular:0x220800,shininess:8})));
      globe.add(new THREE.Mesh(new THREE.SphereGeometry(1.04,32,32),new THREE.MeshPhongMaterial({color:0xcc3300,transparent:true,opacity:.055,side:THREE.FrontSide})));
      document.getElementById('loading').classList.add('hidden');
      c3d.classList.add('loaded');document.getElementById('cdot').classList.add('loaded');
      startLoop();
    },
    undefined,
    ()=>{
      globe.add(new THREE.Mesh(new THREE.SphereGeometry(1,64,64),new THREE.MeshPhongMaterial({color:0xb84010,specular:0x110400,shininess:5})));
      document.getElementById('loading').classList.add('hidden');
      c3d.classList.add('loaded');document.getElementById('cdot').classList.add('loaded');
      startLoop();
    }
  );
}

// ── NODES ─────────────────────────────────────────────────────────
function makeNode(p){
  const phi=(90-p.la)*Math.PI/180,theta=(p.lo+180)*Math.PI/180;
  return{...p,phase:Math.random()*Math.PI*2,
    lv:new THREE.Vector3(-Math.sin(phi)*Math.cos(theta),Math.cos(phi),Math.sin(phi)*Math.sin(theta)),
    sx:0,sy:0,vis:false};
}
const cities=PROJECTS.map(makeNode);

// ── DOT CANVAS ────────────────────────────────────────────────────
const cdot=document.getElementById('cdot');
const ctx=cdot.getContext('2d');
cdot.width=innerWidth;cdot.height=innerHeight;
const _pv=new THREE.Vector3();
function proj(wv){_pv.copy(wv).project(cam);return{x:((_pv.x+1)/2)*cdot.width,y:((-_pv.y+1)/2)*cdot.height};}
function rgba(hex,a){return`rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${+a.toFixed(3)})`;}

// ── INTERACTION — exact copy from cheviaggio.xyz ──────────────────
const hit=document.getElementById('hit');
const isMobile=/Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent)||innerWidth<=768;
const CAM_MIN=isMobile?2.3:2.2,CAM_MAX=isMobile?7.5:4.2;

const _startCity=cities[Math.floor(Math.random()*cities.length)];
const _sPhi=(90-_startCity.la)*Math.PI/180,_sTheta=(_startCity.lo+180)*Math.PI/180;
const _sVec=new THREE.Vector3(-Math.sin(_sPhi)*Math.cos(_sTheta),Math.cos(_sPhi),Math.sin(_sPhi)*Math.sin(_sTheta));
const _sQ=new THREE.Quaternion().setFromUnitVectors(_sVec,new THREE.Vector3(0,0,1));
const _sE=new THREE.Euler().setFromQuaternion(_sQ,'YXZ');
let rx=Math.max(-1.4,Math.min(1.4,_sE.x)),ry=_sE.y,vx=0,vy=0;
let drag=false,moved=false,px0=0,py0=0;
let hov=-1,mx=-999,my=-999;
let camZTarget=isMobile?5.5:3.2;

globe.rotation.x=rx;globe.rotation.y=ry;

function applyZoom(d){camZTarget=Math.max(CAM_MIN,Math.min(CAM_MAX,camZTarget+d));}
function down(cx,cy){drag=true;moved=false;px0=cx;py0=cy;vx=0;vy=0;hit.classList.add('dragging');}
function move(cx,cy){
  if(!drag)return;
  const dx=cx-px0,dy=cy-py0;
  if(Math.abs(dx)>3||Math.abs(dy)>3)moved=true;
  const sens=Math.max(0.00012,(cam.position.z-1.1)*0.0025);vx=dy*sens;vy=dx*sens;rx+=vx;ry+=vy;
  rx=Math.max(-1.4,Math.min(1.4,rx));px0=cx;py0=cy;
}
function up(cx,cy){if(!drag)return;drag=false;hit.classList.remove('dragging');if(!moved)tap(cx,cy);}

hit.addEventListener('mousedown',e=>down(e.clientX,e.clientY));
window.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  document.getElementById('tip').style.left=(mx+14)+'px';
  document.getElementById('tip').style.top=(my-10)+'px';
  move(e.clientX,e.clientY);
});
window.addEventListener('mouseup',e=>up(e.clientX,e.clientY));
hit.addEventListener('wheel',e=>{e.preventDefault();applyZoom(e.deltaY*(camZTarget-1.05)*0.002);},{passive:false});

let pinchD0=0,pinching=false;
hit.addEventListener('touchstart',e=>{e.preventDefault();if(e.touches.length===2){pinching=true;drag=false;moved=false;hit.classList.remove('dragging');pinchD0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}else if(e.touches.length===1&&!pinching){down(e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});
hit.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);applyZoom((pinchD0-d)*(camZTarget-1.05)*0.004);pinchD0=d;}else if(e.touches.length===1&&!pinching){move(e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});
hit.addEventListener('touchend',e=>{e.preventDefault();if(e.touches.length<2)pinching=false;if(e.touches.length===0)up(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});

function tap(cx,cy){
  let best=-1,bd=32*32;
  cities.forEach((c,i)=>{if(!c.vis)return;const d=(cx-c.sx)**2+(cy-c.sy)**2;if(d<bd){bd=d;best=i;}});
  if(best>=0)openPlayer(best);
}

// ── PLAYER ────────────────────────────────────────────────────────
const playerEl=document.getElementById('player');
playerEl.addEventListener('touchstart',e=>e.stopPropagation(),{passive:true});
playerEl.addEventListener('mousedown',e=>e.stopPropagation());
document.getElementById('pclose').onclick=e=>{e.stopPropagation();closePlayer();};

function closePlayer(){
  playerEl.classList.remove('on');
  hit.classList.remove('player-open');
  if(!isMobile)camZTarget=3.9;else camZTarget=5.5;
}

function rotateTo(city){
  const target=new THREE.Vector3(0,0,1);
  const q=new THREE.Quaternion().setFromUnitVectors(city.lv,target);
  const e=new THREE.Euler().setFromQuaternion(q,'YXZ');
  const startRx=rx,startRy=ry;
  let tRx=e.x,tRy=e.y;
  while(tRy-ry>Math.PI)tRy-=Math.PI*2;
  while(ry-tRy>Math.PI)tRy+=Math.PI*2;
  tRx=Math.max(-1.4,Math.min(1.4,tRx));
  let fr=0;
  const anim=()=>{fr++;const p=1-Math.pow(1-fr/55,3);rx=startRx+(tRx-startRx)*p;ry=startRy+(tRy-startRy)*p;vx=0;vy=0;if(fr<55)requestAnimationFrame(anim);};
  requestAnimationFrame(anim);
}

function openPlayer(idx){
  const c=cities[idx];
  const col=PANEL_ACCENT;
  const r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);
  playerEl.style.setProperty('--pcol',col);
  playerEl.style.setProperty('--pcol-rgb',`${r},${g},${b}`);
  rotateTo(c);
  if(!isMobile)camZTarget=CAM_MIN;

  document.getElementById('pflag').textContent=PANEL_EMOJI;
  document.getElementById('pcity').textContent=c.tag;
  document.getElementById('pcity').style.color=col;
  document.getElementById('ptitle').textContent=c.n;

  // Hide plist and all panels, then show the right one
  document.getElementById('plist').style.display='none';
  document.querySelectorAll('.panel-content').forEach(p=>p.style.display='none');
  const panelId='panel-'+c.panel;
  const panelEl=document.getElementById(panelId);
  if(panelEl)panelEl.style.display='';

  playerEl.classList.add('on');
  hit.classList.add('player-open');
  document.getElementById('hint').classList.add('off');
}

// ── LOOP ─────────────────────────────────────────────────────────
let t=0;
const fwd=new THREE.Vector3(0,0,1);
let lastActivity=Date.now();
function markActive(){lastActivity=Date.now();}
['mousedown','mousemove','wheel','touchstart','touchmove'].forEach(ev=>window.addEventListener(ev,markActive,{passive:true}));
let lastFrame=0;
const FRAME_MS=1000/30;

function loop(now=0){
  requestAnimationFrame(loop);
  if(now-lastFrame<FRAME_MS)return;
  lastFrame=now;t+=.016;
  const idle=Date.now()-lastActivity>4000;
  if(!drag){vx*=.88;vy*=.88;rx+=vx;ry+=vy;rx=Math.max(-1.4,Math.min(1.4,rx));}
  cam.position.z+=(camZTarget-cam.position.z)*.18;
  if(idle&&Math.abs(vx)<.0001&&Math.abs(vy)<.0001&&Math.abs(cam.position.z-camZTarget)<.001){globe.rotation.x=rx;globe.rotation.y=ry;return;}
  globe.rotation.x=rx;globe.rotation.y=ry;
  renderer.render(scene,cam);

  ctx.clearRect(0,0,cdot.width,cdot.height);
  let nh=-1;
  cities.forEach((c,i)=>{
    const wv=c.lv.clone().applyQuaternion(globe.quaternion);
    const f=wv.dot(fwd);c.vis=f>.05;if(!c.vis)return;
    const {x,y}=proj(wv);c.sx=x;c.sy=y;
    const col=c.col,isH=i===hov;
    const pulse=.4+.3*Math.sin(t*1.5+c.phase);
    const fade=Math.min(1,(f-.05)/.15);
    // Country-style dot (identico a cheviaggio.xyz)
    const baseR=isH?10:7;
    const hr=isH?28:14+pulse*6;
    const g=ctx.createRadialGradient(x,y,2,x,y,hr);
    g.addColorStop(0,rgba(col,.45*fade));g.addColorStop(.5,rgba(col,.12*fade));g.addColorStop(1,rgba(col,0));
    ctx.beginPath();ctx.arc(x,y,hr,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.arc(x,y,baseR,0,Math.PI*2);ctx.fillStyle=rgba(col,fade);ctx.fill();
    ctx.beginPath();ctx.arc(x,y,baseR+4,0,Math.PI*2);ctx.strokeStyle=rgba(col,.6*fade);ctx.lineWidth=1.5;ctx.stroke();
    ctx.beginPath();ctx.arc(x,y,isH?4:2.5,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${.95*fade})`;ctx.fill();
    if(Math.hypot(mx-x,my-y)<28)nh=i;
  });

  if(nh!==hov){
    hov=nh;
    const tip=document.getElementById('tip');
    if(nh>=0){
      const c=cities[nh];
      document.getElementById('tipname').textContent=c.n;
      document.getElementById('tipcount').textContent=c.tag;
      tip.classList.add('on');hit.style.cursor='pointer';
    } else {tip.classList.remove('on');if(!drag)hit.style.cursor='grab';}
  }
}

let loopStarted=false;
function startLoop(){if(loopStarted)return;loopStarted=true;loop();}

document.addEventListener('visibilitychange',()=>{if(document.hidden)lastFrame=Infinity;else{lastFrame=0;lastActivity=Date.now();}});
window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);cdot.width=innerWidth;cdot.height=innerHeight;});
setTimeout(()=>document.getElementById('hint').classList.add('off'),7000);

loadTexture();
</script>
