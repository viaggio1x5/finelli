<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X32 Behringer — Enter Password</title>
<meta name="robots" content="noindex,nofollow">
<link rel="canonical" href="https://finelli.xyz/x32-password"/>
<link rel="icon" type="image/x-icon" href="favicon_portfolio/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon_portfolio/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon_portfolio/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon_portfolio/apple-touch-icon.png">
<link rel="manifest" href="favicon_portfolio/site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=Be+Vietnam+Pro:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0f12; --surface:#16181d; --border:#2a2d38;
  --text:#e8eaf0; --muted:#7a7f94;
  --accent:#e8344a; --accent-blue:#4a7cff;
  --font-sans:'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-display:'Be Vietnam Pro', ui-sans-serif, system-ui, sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-sans);}
body{display:flex;align-items:center;justify-content:center;padding:24px;}
.card{
  width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:28px;box-shadow:0 24px 64px rgba(0,0,0,.4);
}
.cover{
  width:100%;aspect-ratio:16/10;border-radius:14px;overflow:hidden;margin-bottom:20px;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);background:#000;
}
.cover img{width:100%;height:100%;object-fit:cover;display:block;}
.tag{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#8a5cff;margin-bottom:8px;}
h1{font-family:var(--font-display);font-size:1.6rem;font-weight:700;margin-bottom:6px;line-height:1.15;}
.subtitle{font-size:.85rem;font-style:italic;color:var(--muted);margin-bottom:22px;}
label{font-size:.72rem;font-weight:600;color:var(--muted);letter-spacing:.03em;display:block;margin-bottom:8px;}
.row{display:flex;gap:10px;}
input[type=password]{
  flex:1;min-width:0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);
  border-radius:8px;padding:12px 14px;color:var(--text);font-size:.95rem;font-family:inherit;outline:none;
  transition:border-color .15s,background .15s;
}
input[type=password]::placeholder{color:var(--muted);}
input[type=password]:focus{border-color:rgba(232,52,74,.55);background:rgba(255,255,255,.07);}
input.shake{animation:shake .35s;}
@keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(3px)}30%,50%,70%{transform:translateX(-5px)}40%,60%{transform:translateX(5px)}}
button{
  flex-shrink:0;background:var(--accent);color:#fff;border:2px solid rgba(255,255,255,.15);
  border-radius:8px;padding:12px 18px;font-size:.9rem;font-weight:700;cursor:pointer;
  transition:filter .15s,transform .1s;
}
button:hover{filter:brightness(1.1);}
button:active{transform:scale(.97);}
.error{font-size:.78rem;font-weight:500;color:#ff6b6b;margin-top:10px;display:none;}
.error.show{display:block;}
.back{display:inline-block;margin-top:22px;font-size:.75rem;color:var(--muted);text-decoration:none;}
.back:hover{color:var(--text);}
</style>
</head>
<body>
  <div class="card">
    <div class="cover">
      <img src="https://cdn.prod.website-files.com/69e6351a6a69ae90b1469140/69e6351a6a69ae90b14691fe_X32.png" alt="X32 Behringer cover">
    </div>
    <div class="tag">Tablet App</div>
    <h1>X32 Behringer</h1>
    <p class="subtitle">Revolutionizing Live Sound</p>

    <label for="pw">Enter the password to view this case study</label>
    <div class="row">
      <input type="password" id="pw" placeholder="Password" autocomplete="off" spellcheck="false">
      <button id="submit" type="button">Enter →</button>
    </div>
    <div class="error" id="err">Incorrect password — try again.</div>

    <a class="back" href="https://finelli.xyz/portfolio">← Back to portfolio</a>
  </div>

<script>
  // TODO: replace 'password' with the real one before going live — this is
  // a client-side gate only, not real access control.
  const PASSWORD='password';
  const DEST='https://finelli.xyz/x32';

  const input=document.getElementById('pw');
  const btn=document.getElementById('submit');
  const err=document.getElementById('err');

  function attempt(){
    if(input.value===PASSWORD){
      window.location.href=DEST;
    }else{
      err.classList.add('show');
      input.classList.remove('shake');
      void input.offsetWidth; // restart the shake animation
      input.classList.add('shake');
      input.value='';
      input.focus();
    }
  }

  btn.addEventListener('click',attempt);
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();attempt();}
  });
  input.addEventListener('input',()=>err.classList.remove('show'));
  input.focus();
</script>
</body>
</html>
