<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Caterina Finelli</title>
<meta name="description" content="Caterina Finelli — Product Designer. Portfolio, podcast, blog e radio."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --font-sans: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --bg: #000005;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    cursor: none;
    touch-action: none;
  }

  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* Custom cursor — hidden on touch devices */
  #cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease, width 0.2s ease, height 0.2s ease, background 0.2s ease;
    mix-blend-mode: difference;
  }
  #cursor.hover {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.6);
  }
  @media (hover: none) {
    #cursor { display: none; }
    html, body { cursor: auto; }
  }

  /* Header */
  #header {
    position: fixed;
    top: 36px; left: 40px;
    z-index: 100;
    pointer-events: none;
  }
  @media (max-width: 480px) {
    #header { top: 28px; left: 24px; }
  }
  #header h1 {
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: clamp(13px, 1.6vw, 18px);
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  #header p {
    font-family: var(--font-mono);
    font-size: 9px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* Planet info — bottom center */
  #planet-info {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 52px;
    pointer-events: none;
    z-index: 100;
    transition: opacity 0.5s ease;
  }

  #planet-name {
    font-family: var(--font-sans);
    font-style: normal;
    font-weight: 700;
    font-size: clamp(32px, 7vw, 58px);
    color: white;
    letter-spacing: -0.02em;
    text-align: center;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  #planet-sub {
    font-family: var(--font-mono);
    font-size: clamp(9px, 1.4vw, 11px);
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 10px;
    text-align: center;
    transition: opacity 0.3s ease;
  }

  #planet-action {
    font-family: var(--font-mono);
    font-size: 9px;
    color: rgba(255,255,255,0.22);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    margin-top: 18px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: auto;
    cursor: pointer;
  }
  #planet-action.has-link { opacity: 1; color: rgba(255,255,255,0.45); }
  #planet-action.has-link:hover { color: rgba(255,255,255,0.85); }

  /* Dot indicators */
  #dots {
    position: fixed;
    bottom: 24px;
    left: 50%; transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 100;
    pointer-events: none;
  }
  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.4s ease, transform 0.4s ease;
  }
  .dot.active {
    background: rgba(255,255,255,0.8);
    transform: scale(1.4);
  }

  /* Swipe hint */
  #hint {
    position: fixed;
    bottom: 26px; right: 36px;
    font-family: var(--font-mono);
    font-size: 9px;
    color: rgba(255,255,255,0.18);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    z-index: 100;
    pointer-events: none;
    transition: opacity 1s ease;
  }
  #hint.hidden { opacity: 0; }

  /* Click ripple */
  .ripple {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.4);
    pointer-events: none;
    z-index: 300;
    animation: ripple-out 0.8s ease-out forwards;
    transform: translate(-50%, -50%);
  }
  @keyframes ripple-out {
    from { width: 0; height: 0; opacity: 1; }
    to { width: 120px; height: 120px; opacity: 0; }
  }

  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  body { animation: fadeIn 2s ease forwards; }
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="canvas"></canvas>

<div id="header">
  <h1>Caterina Finelli</h1>
  <p>Product Designer</p>
</div>

<div id="planet-info">
  <div id="planet-name">Terra</div>
  <div id="planet-sub">cheviaggio.xyz</div>
  <div id="planet-action">— visita —</div>
</div>

<div id="dots"></div>
<div id="hint">← swipe →</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── PLANET DATA ─────────────────────────────────────────────────────────────
const planetData = [
  {
    id: 'venus',
    texture: 'venus.webp',
    radius: 1.3,
    tilt: 0.05,
    tipName: 'Venere',
    sub: 'Blog — coming soon',
    url: null,
    atmosphereColor: 0xff8833,
    atmosphereOpacity: 0.18,
    rotSpeed: 0.0008   // Venere ruota molto lentamente (e in senso inverso, ma semplifichiamo)
  },
  {
    id: 'earth',
    texture: 'earth.webp',
    radius: 1.4,
    tilt: 0.41,
    tipName: 'Terra',
    sub: 'cheviaggio.xyz',
    url: 'https://cheviaggio.xyz',
    atmosphereColor: 0x4488ff,
    atmosphereOpacity: 0.12,
    rotSpeed: 0.0032
  },
  {
    id: 'mars',
    texture: 'mars.webp',
    radius: 1.1,
    tilt: 0.44,
    tipName: 'Marte',
    sub: 'Portfolio',
    url: 'https://finelli.xyz/portfolio',
    atmosphereColor: 0xff6633,
    atmosphereOpacity: 0.08,
    rotSpeed: 0.0031
  },
  {
    id: 'jupiter',
    texture: 'jupiter.wepb',
    radius: 2.2,
    tilt: 0.05,
    tipName: 'Giove',
    sub: 'Radio — coming soon',
    url: null,
    atmosphereColor: 0xccaa77,
    atmosphereOpacity: 0.06,
    rotSpeed: 0.008   // Giove è il più veloce del sistema solare
  }
];

const N = planetData.length;

// ─── SCENE ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();

// Camera leggermente dall'alto per vedere la prospettiva dell'anello
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 3.5, 16);
camera.lookAt(0, 0, 0);

// ─── LIGHTING ────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambient);
const key = new THREE.DirectionalLight(0xfff5e0, 1.1);
key.position.set(8, 6, 10);
scene.add(key);
const fill = new THREE.DirectionalLight(0x8899bb, 0.35);
fill.position.set(-10, -5, -8);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xaabbff, 0.2);
rim.position.set(0, 10, -15);
scene.add(rim);

// ─── STARS ───────────────────────────────────────────────────────────────────
(function createStars() {
  const geo = new THREE.BufferGeometry();
  const count = 3000;
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    pos[i*3]   = (Math.random()-0.5)*1200;
    pos[i*3+1] = (Math.random()-0.5)*1200;
    pos[i*3+2] = (Math.random()-0.5)*1200;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0xffffff, size: 0.22, transparent: true, opacity: 0.65, sizeAttenuation: true
  })));
})();

// ─── RING GEOMETRY ───────────────────────────────────────────────────────────
// I pianeti sono su un cerchio di raggio RING_R nel piano XZ,
// inclinato verso la camera di RING_TILT radianti.
// L'angolo 0 (pianeta attivo) è sempre davanti alla camera, a Z positivo.
// Angolo base di ogni pianeta: (2π / N) * i
// Ruotando il ring di `ringAngle`, tutti i pianeti si spostano insieme.

const RING_R    = 7.0;    // raggio dell'anello
const RING_TILT = 0.38;   // inclinazione verso la camera (radianti)
const STEP      = (2 * Math.PI) / N;   // angolo tra un pianeta e l'altro

// Trasforma un angolo sull'anello in posizione 3D
function ringPos(angle) {
  // Cerchio nel piano XZ, poi tilt attorno all'asse X
  const x = Math.sin(angle) * RING_R;
  const zFlat = Math.cos(angle) * RING_R;
  const y = -Math.sin(RING_TILT) * zFlat + 1.8;
  const z =  Math.cos(RING_TILT) * zFlat;
  return new THREE.Vector3(x, y, z);
}

// Scala e opacità in base alla profondità Z (fronte = grande, retro = piccolo)
function ringVisual(angle) {
  const z = Math.cos(RING_TILT) * Math.cos(angle) * RING_R;
  // z va da -RING_R a +RING_R; normalizziamo in 0..1
  const norm = (z + RING_R) / (2 * RING_R);   // 0 = dietro, 1 = davanti
  const scale   = 0.45 + norm * 0.55;
  const opacity = 0.25 + norm * 0.75;
  return { scale, opacity };
}

// ─── BUILD PLANETS ───────────────────────────────────────────────────────────
const loader = new THREE.TextureLoader();
const planets = [];

planetData.forEach((p, i) => {
  const tex = loader.load(p.texture);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();

  const geo = new THREE.SphereGeometry(p.radius, 64, 64);
  const mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.88, metalness: 0.0 });
  mat.transparent = true;
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.z = p.tilt;

  const atmGeo = new THREE.SphereGeometry(p.radius * 1.045, 32, 32);
  const atmMat = new THREE.MeshBasicMaterial({
    color: p.atmosphereColor, transparent: true,
    opacity: p.atmosphereOpacity, side: THREE.FrontSide
  });
  mesh.add(new THREE.Mesh(atmGeo, atmMat));

  const group = new THREE.Group();
  group.add(mesh);
  scene.add(group);

  // Angolo iniziale sull'anello: pianeta 0 (activeIndex=1→Earth) va a angolo 0 (davanti)
  // activeIndex iniziale = 1, quindi pianeta i ha angolo (i - 1) * STEP
  const baseAngle = (i - 1) * STEP;

  planets.push({ ...p, mesh, group, atmMat, baseAngle });
});

// ─── STATO ANELLO ────────────────────────────────────────────────────────────
// ringAngle è l'angolo corrente di rotazione dell'anello (sommato a baseAngle)
// Quando si swipa, ringAngle si sposta di ±STEP
let ringAngle     = 0;          // angolo corrente (interpolato)
let ringAngleFrom = 0;          // angolo di partenza della transizione
let ringAngleTo   = 0;          // angolo di destinazione
let activeIndex   = 1;          // indice del pianeta in primo piano
let isAnimating   = false;
let animProgress  = 0;

function mod(n, m) { return ((n % m) + m) % m; }

function startTransition(dir) {
  // dir: +1 = successivo (swipe sinistra), -1 = precedente (swipe destra)
  if (isAnimating) return;
  ringAngleFrom = ringAngleTo;
  ringAngleTo  += dir * STEP;
  activeIndex   = mod(activeIndex - dir, N);
  isAnimating   = true;
  animProgress  = 0;
  updateUI(activeIndex);
}

// ─── UI ──────────────────────────────────────────────────────────────────────
const nameEl       = document.getElementById('planet-name');
const subEl        = document.getElementById('planet-sub');
const actionEl     = document.getElementById('planet-action');
const dotsContainer = document.getElementById('dots');
const hint         = document.getElementById('hint');

planetData.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === activeIndex ? ' active' : '');
  dotsContainer.appendChild(d);
});

nameEl.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
subEl.style.transition  = 'opacity 0.3s ease';

let hintHidden = false;
function hideHint() {
  if (!hintHidden) { hintHidden = true; hint.classList.add('hidden'); }
}

function updateUI(idx) {
  const p = planetData[idx];
  nameEl.style.opacity   = '0';
  nameEl.style.transform = 'translateY(8px)';
  subEl.style.opacity    = '0';
  setTimeout(() => {
    nameEl.textContent     = p.tipName;
    subEl.textContent      = p.sub;
    nameEl.style.opacity   = '1';
    nameEl.style.transform = 'translateY(0)';
    subEl.style.opacity    = '1';
    if (p.url) {
      actionEl.textContent = '— visita —';
      actionEl.className   = 'has-link';
      actionEl.onclick     = () => window.open(p.url, '_blank');
    } else {
      actionEl.textContent = '— coming soon —';
      actionEl.className   = '';
      actionEl.onclick     = null;
    }
  }, 150);
  Array.from(dotsContainer.children).forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });
}

updateUI(activeIndex);

// ─── INPUT ───────────────────────────────────────────────────────────────────
const cursor = document.getElementById('cursor');
let touchStartX = null, touchStartY = null;
let mouseStartX = null, mouseDown = false, mouseDragged = false;
const SWIPE_THRESHOLD = 40;

canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

canvas.addEventListener('touchend', e => {
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > SWIPE_THRESHOLD) {
    hideHint();
    startTransition(dx < 0 ? 1 : -1);
  }
  touchStartX = null;
}, { passive: true });

canvas.addEventListener('mousedown', e => { mouseDown = true; mouseDragged = false; mouseStartX = e.clientX; });
canvas.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
  if (mouseDown && Math.abs(e.clientX - mouseStartX) > 5) mouseDragged = true;
});
canvas.addEventListener('mouseup', e => {
  if (mouseDown && mouseDragged) {
    const dx = e.clientX - mouseStartX;
    if (Math.abs(dx) > SWIPE_THRESHOLD) { hideHint(); startTransition(dx < 0 ? 1 : -1); }
  }
  mouseDown = false;
});

canvas.addEventListener('click', e => {
  if (mouseDragged) return;
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = e.clientX + 'px';
  r.style.top  = e.clientY + 'px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 800);

  // Click su un pianeta laterale → naviga verso di lui
  const mouse2D = new THREE.Vector2(
    (e.clientX / window.innerWidth)  *  2 - 1,
    (e.clientY / window.innerHeight) * -2 + 1
  );
  const ray = new THREE.Raycaster();
  ray.setFromCamera(mouse2D, camera);
  const hits = ray.intersectObjects(planets.map(p => p.mesh));
  if (hits.length > 0) {
    const hitMesh = hits[0].object;
    const hitIdx  = planets.findIndex(p => p.mesh === hitMesh);
    if (hitIdx !== activeIndex) {
      hideHint();
      // Calcola la direzione più corta sull'anello
      let diff = hitIdx - activeIndex;
      if (diff >  N/2) diff -= N;
      if (diff < -N/2) diff += N;
      startTransition(-diff);   // negativo perché activeIndex e dir sono invertiti
    } else if (planets[hitIdx].url) {
      window.open(planets[hitIdx].url, '_blank');
    }
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  { hideHint(); startTransition(-1); }
  if (e.key === 'ArrowRight') { hideHint(); startTransition( 1); }
});

// ─── EASING ──────────────────────────────────────────────────────────────────
function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
}

// ─── ANIMATE ─────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
const ANIM_DURATION = 0.65;

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  // Avanza transizione
  if (isAnimating) {
    animProgress += delta / ANIM_DURATION;
    if (animProgress >= 1) { animProgress = 1; isAnimating = false; }
  }

  const t = easeInOutCubic(Math.min(animProgress, 1));
  ringAngle = ringAngleFrom + (ringAngleTo - ringAngleFrom) * t;

  // Posiziona ogni pianeta sull'anello
  planets.forEach((p, i) => {
    const angle = p.baseAngle + ringAngle;
    const pos   = ringPos(angle);
    const vis   = ringVisual(angle);

    p.group.position.copy(pos);
    p.group.scale.setScalar(vis.scale);
    p.mesh.material.opacity = vis.opacity;

    // Autorotazione (asse Y inclinato del tilt del pianeta)
    p.mesh.rotation.y += p.rotSpeed;
  });

  renderer.render(scene, camera);
}

animate();

// ─── RESIZE ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
